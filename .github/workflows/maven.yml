# Backend CI: builds the Spring Boot app with Maven, runs Spock specs, and
# publishes the JaCoCo coverage badge + report.
#
# Triggers only when backend-relevant paths change (pom.xml, Java/Groovy
# sources, resources). Frontend changes go through frontend.yml. The workflow
# file itself is included so edits here still trigger a run.

name: Backend CI (Maven)

on:
  push:
    paths:
      - 'pom.xml'
      - 'src/main/java/**'
      - 'src/main/resources/**'
      - 'src/test/**'
      - '.github/workflows/maven.yml'
  pull_request:
    paths:
      - 'pom.xml'
      - 'src/main/java/**'
      - 'src/main/resources/**'
      - 'src/test/**'
      - '.github/workflows/maven.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push the updated JaCoCo badge back to the repo

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      # -DskipFrontend=true skips the frontend-maven-plugin executions
      # (install Node/npm, npm install, ng build). The frontend has its own
      # workflow (frontend.yml).
      - name: Build with Maven (backend only)
        run: mvn -B -DskipFrontend=true package --file pom.xml

      - name: Generate JaCoCo Badge
        uses: cicirello/jacoco-badge-generator@v2

      - name: Commit the badge (if it changed)
        run: |
          if [[ `git status --porcelain` ]]; then
            git config --global user.name 'UnLow1'
            git config --global user.email 'adam.jamka.1995@gmail.com'
            git add .github/badges/jacoco.svg
            git commit -m "Autogenerated JaCoCo coverage badge"
            git push
          fi

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
