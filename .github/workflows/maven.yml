# Backend CI: builds the Spring Boot app with Maven, runs Spock specs, and
# uploads the JaCoCo report to Codecov.
#
# Triggers only when backend-relevant paths change (pom.xml, Java/Groovy
# sources, resources). Frontend changes go through frontend.yml. The workflow
# file itself is included so edits here still trigger a run.

name: Backend CI (Maven)

on:
  push:
    paths:
      - 'pom.xml'
      - 'src/main/java/**'
      - 'src/main/resources/**'
      - 'src/test/**'
      - '.github/workflows/maven.yml'
  pull_request:
    paths:
      - 'pom.xml'
      - 'src/main/java/**'
      - 'src/main/resources/**'
      - 'src/test/**'
      - '.github/workflows/maven.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      # -DskipFrontend=true skips the frontend-maven-plugin executions
      # (install Node/npm, npm install, ng build). The frontend has its own
      # workflow (frontend.yml).
      - name: Build with Maven (backend only)
        run: mvn -B -DskipFrontend=true package --file pom.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco/
