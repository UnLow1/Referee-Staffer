# Frontend CI: builds, lints, and tests the Angular app under src/main/webapp.
#
# Triggers only when frontend-relevant paths change. Backend changes go
# through maven.yml.

name: Frontend CI (Angular)

on:
  push:
    paths:
      - 'src/main/webapp/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'src/main/webapp/**'
      - '.github/workflows/frontend.yml'

defaults:
  run:
    working-directory: src/main/webapp

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'
          cache-dependency-path: src/main/webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # ChromeHeadlessNoSandbox custom launcher is defined in src/karma.conf.js
      # — required because the GitHub runner's Chrome doesn't run sandboxed in
      # the container environment.
      - name: Unit tests
        run: npm test -- --watch=false --browsers=ChromeHeadlessNoSandbox --no-progress
