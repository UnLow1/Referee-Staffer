# Frontend CI: builds and tests the Angular app under src/main/webapp.
#
# Triggers only when frontend-relevant paths change. Backend changes go
# through maven.yml.
#
# Note on lint: `npm run lint` currently surfaces ~134 pre-existing errors
# (mostly @angular-eslint/prefer-inject after the Angular 15 -> 20 jump).
# Leaving lint OUT of the required steps for now — re-enable once the code
# is cleaned up (e.g. by running `ng generate @angular/core:inject`).

name: Frontend CI (Angular)

on:
  push:
    paths:
      - 'src/main/webapp/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'src/main/webapp/**'
      - '.github/workflows/frontend.yml'

defaults:
  run:
    working-directory: src/main/webapp

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'
          cache-dependency-path: src/main/webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # ChromeHeadlessNoSandbox custom launcher is defined in src/karma.conf.js
      # — required because the GitHub runner's Chrome doesn't run sandboxed in
      # the container environment.
      - name: Unit tests
        run: npm test -- --watch=false --browsers=ChromeHeadlessNoSandbox --no-progress
