# E2E CI: drives the critical flow (import -> staffing -> save -> standings)
# through a real browser with Playwright against the packaged application.
#
# Unlike maven.yml (backend only) and frontend.yml (frontend only), this workflow
# needs the whole stack: it builds the fat jar with the Angular app baked into
# src/main/resources/static (a full `mvn package`, no -DskipFrontend), then lets
# Playwright boot that jar and run the suite. Kept as its own workflow so the unit
# pipelines stay fast; it triggers on any src/main change, the build file, or its
# own definition.

name: E2E CI (Playwright)

on:
  push:
    paths:
      - 'src/main/**'
      - 'pom.xml'
      - '.github/workflows/e2e.yml'
  pull_request:
    paths:
      - 'src/main/**'
      - 'pom.xml'
      - '.github/workflows/e2e.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'
          cache-dependency-path: src/main/webapp/package-lock.json

      # Full build: frontend-maven-plugin installs the webapp dependencies (including
      # the Playwright test runner) and runs ng build into the static resources, then
      # the jar is repackaged with the SPA inside it.
      - name: Build application (backend + frontend)
        run: mvn -B -DskipTests package --file pom.xml

      - name: Install Playwright browser
        working-directory: src/main/webapp
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: src/main/webapp
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: src/main/webapp/playwright-report/
          retention-days: 7
